exchange: Tokocrypto
server_os: Ubuntu
runtime: Docker Compose
database: PostgreSQL
dashboard: Streamlit
alerts: Discord webhook
llm: Gemini API for summaries only
mode: paper
starting_balance_idr: 1000000
timezone: Asia/Jakarta

symbols:
  - BTC/USDT
  - ETH/USDT

risk:
  daily_profit_target_percent: 1.0
  daily_max_loss_percent: 0.5
  risk_per_trade_percent: 0.1
  max_position_size_percent: 25
  max_trades_per_day: 10
  max_consecutive_losses: 3
  pause_after_consecutive_losses_minutes: 60
  max_spread_bps: 8

compounding:
  enabled: true
  update_frequency: weekly
  max_weekly_size_increase_percent: 10
  reduce_size_immediately_on_drawdown: true

data:
  candle_timeframe: 1m
  candle_poll_seconds: 30
  quote_interval_seconds: 5
  order_book_depth: 20
  order_book_interval_seconds: 10
  trades_interval_seconds: 30
  dashboard_refresh_seconds: 10
  stale_data_seconds: 120
  service_health_ok_interval_seconds: 60

aggregation:
  enabled: true
  interval_seconds: 60
  lookback_minutes: 180

paper_trading:
  enabled: true
  interval_seconds: 30
  strategy_name: micro_momentum_burst_v0
  usdt_idr_rate: 16000
  fee_rate_bps: 10
  slippage_bps: 2
  take_profit_bps: 40
  stop_loss_bps: 20
  max_holding_minutes: 5
  cooldown_after_trade_seconds: 300
  cooldown_after_loss_seconds: 900
  max_feature_age_seconds: 180
  min_quote_count: 3
  min_trade_count: 3
  min_order_book_count: 3
  min_trade_flow_imbalance: 0.35
  min_orderbook_imbalance: 0.15
  min_volatility_bps: 2.0
  dynamic_exit_on_trade_flow_negative: true
  dynamic_exit_on_orderbook_negative: true
  experiments:
    - name: micro_burst_strict_v0
      strategy_name: micro_momentum_burst_v0
    - name: micro_burst_loose_v0
      strategy_name: micro_momentum_burst_v0
      take_profit_bps: 45
      stop_loss_bps: 20
      min_trade_flow_imbalance: 0.2
      min_orderbook_imbalance: 0.08
      min_volatility_bps: 1.5
    - name: micro_burst_no_dynamic_exit_v0
      strategy_name: micro_momentum_burst_v0
      max_holding_minutes: 7
      dynamic_exit_on_trade_flow_negative: false
      dynamic_exit_on_orderbook_negative: false
    - name: ema_baseline_v0
      strategy_name: ema_baseline_v0
      take_profit_bps: 60
      stop_loss_bps: 25
      max_holding_minutes: 10
      min_volatility_bps: 2.5
      risk:
        max_trades_per_day: 6

reporting:
  enabled: true
  interval_seconds: 900
  discord_daily_summary_enabled: false

tokocrypto:
  base_url: https://www.tokocrypto.site
  request_timeout_seconds: 10
  max_retries: 3
  retry_backoff_seconds: 1.5

alerts_config:
  cooldown_seconds: 900
  disk_usage_warning_percent: 85
  disk_check_interval_seconds: 300
