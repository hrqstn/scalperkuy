services:
  postgres:
    image: postgres:16-alpine
    container_name: scalperkuy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scalperkuy}
      POSTGRES_USER: ${POSTGRES_USER:-scalperkuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scalperkuy_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scalperkuy} -d ${POSTGRES_DB:-scalperkuy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build: .
    container_name: scalperkuy-collector
    command: python -m app.collector.service
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scalperkuy}:${POSTGRES_PASSWORD:-scalperkuy_dev_password}@postgres:5432/${POSTGRES_DB:-scalperkuy}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  paper_trader:
    build: .
    container_name: scalperkuy-paper-trader
    command: python -m app.paper.trader
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scalperkuy}:${POSTGRES_PASSWORD:-scalperkuy_dev_password}@postgres:5432/${POSTGRES_DB:-scalperkuy}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  aggregator:
    build: .
    container_name: scalperkuy-aggregator
    command: python -m app.aggregation.service
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scalperkuy}:${POSTGRES_PASSWORD:-scalperkuy_dev_password}@postgres:5432/${POSTGRES_DB:-scalperkuy}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  reporter:
    build: .
    container_name: scalperkuy-reporter
    command: python -m app.reporting.service
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scalperkuy}:${POSTGRES_PASSWORD:-scalperkuy_dev_password}@postgres:5432/${POSTGRES_DB:-scalperkuy}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  dashboard:
    build: .
    container_name: scalperkuy-dashboard
    command: streamlit run app/dashboard/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scalperkuy}:${POSTGRES_PASSWORD:-scalperkuy_dev_password}@postgres:5432/${POSTGRES_DB:-scalperkuy}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
